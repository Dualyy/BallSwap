[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "exiira"
name = "BallSwap"
description = "Periodically swaps all players' balls during a match. Interval is configurable and can be fixed or random."
websiteUrl = ""
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/BallSwap/release/com.github.exiira.BallSwap.dll"
target = "plugins/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

[publish]
communities = ["super-battle-golf"]

[publish.categories]
super-battle-golf = ["mods", "hostonly", "misc"]
